<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Music Player</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="music-player.css">
    </head>
    <body>
        <div style="backdrop-filter: blur 15px;"id="music-player">
             <div id="music-playerheader" style="border: solid; width: 100%; border-radius: 15px; position: absolute; left: -0.5%; top: -1%; height: 30px;display: flex;justify-content: flex-end;">
            </div> 
            <img id="song-image" src="giphy.gif"></img>
            <div id="song-name">song</div>
            <div id="song-artist">artist</div>

            <input id="slider-song" type = range>

            <div id="music-buttons">
                <i id="shuffle-song"class="fa-solid fa-shuffle"></i>
                <i id="prev-song" class="fa-solid fa-backward-step fa-2x"></i>
                <i id="playpause-song" class="fa-solid fa-circle-play fa-3x"></i>
                <i id="next-song" class="fa-solid fa-forward-step fa-2x"></i>
                <i id="repeat-song" class="fa-solid fa-repeat"></i>
            </div>
        </div>
        <div id="song-custom-upload">
            
        </div>
       
<div class="fileinputbox">
  <label class="file-label">
     <input type="file" id="song-upload" accept=".mp3,audio/*" multiple>
    <span class="file-cta">
      <span class="file-icon">
        <i class="fas fa-upload"></i>
      </span>
      <span class="file-label"> Choose a file… </span>
    </span>
  </label>
</div>
    <div id="playlist">
        <div id="song1">
            <img id="song-image1" src="giphy.gif"></img>
            <label id="song-name1">song-name</label>
            <label id="song-artist1">song-artist</label>
        </div>
                <div id="song2">
            <img id="song-image2" src="giphy.gif"></img>
            <label id="song-name2">song-name</label>
            <label id="song-artist2">song-artist</label>
        </div>
                <div id="song3">
            <img id="song-image3" src="giphy.gif"></img>
            <label id="song-name3">song-name</label>
            <label id="song-artist3">song-artist</label>
        </div>
    </div>


<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
<script src="music-player.js"></script>
    </body>
</html>
